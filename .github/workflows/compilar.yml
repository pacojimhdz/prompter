name: Construir APK Monetizable
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Java 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 16

    - name: Instalar Cordova Estable
      run: npm install -g cordova@11.0.0

    - name: Crear Estructura Móvil
      run: |
        cordova create app-proyecto com.bigfrank.teleprompter "TeleprompterPro"
        cp config.xml app-proyecto/config.xml
        cp index.html app-proyecto/www/index.html
        cd app-proyecto
        cordova platform add android@10.1.2 --save

    - name: Compilar Archivo de Instalación (APK)
      run: |
        cd app-proyecto
        cordova build android

    - name: Guardar Aplicación Resultante
      uses: actions/upload-artifact@v4
      with:
        name: Teleprompter-Instalable-APK
        path: app-proyecto/platforms/android/app/build/outputs/apk/debug/app-debug.apk
