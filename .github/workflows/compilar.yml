name: Construir APK Monetizable
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Instalar Gradle 8.7 Compatible
      run: |
        # Descarga e instala Gradle 8.7 de forma manual para anular Gradle 9.6
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin:zip
        sudo unzip -q gradle-8.7-bin:zip -d /opt
        echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

    - name: Instalar Android Build Tools 33.0.2
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"

    - name: Instalar Cordova
      run: npm install -g cordova@12.0.0

    - name: Crear Estructura Móvil
      run: |
        cordova create app-proyecto com.bigfrank.teleprompter "TeleprompterPro"
        cp config.xml app-proyecto/config.xml
        cp index.html app-proyecto/www/index.html
        cd app-proyecto
        cordova platform add android@12.0.0 --save

    - name: Parchar Incompatibilidad de XmlParser (Corrección Gradle Viejo)
      run: |
        SED_FILE="app-proyecto/platforms/android/CordovaLib/cordova.gradle"
        if [ -f "$SED_FILE" ]; then
          sed -i 's/new XmlParser(false, false)/new groovy.xml.XmlSlurper(false, false)/g' "$SED_FILE"
          echo "Parchado aplicado"
        fi

    - name: Compilar Archivo de Instalación (APK)
      env:
        CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
      run: |
        cd app-proyecto
        # Forzamos el uso del ejecutable de Gradle 8.7 instalado
        export PATH="/opt/gradle-8.7/bin:$PATH"
        cordova build android --no-telemetry

    - name: Guardar Aplicación Resultante
      uses: actions/upload-artifact@v4
      with:
        name: Teleprompter-Instalable-APK
        path: app-proyecto/platforms/android/app/build/outputs/apk/debug/app-debug.apk
