name: Construir APK Monetizable
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar Código
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: Instalar Cordova
      run: npm install -g cordova

    - name: Crear Estructura Móvil
      run: |
        cordova create app-proyecto com.bigfrank.teleprompter "TeleprompterPro"
        cp config.xml app-proyecto/config.xml
        cp index.html app-proyecto/www/index.html
        cd app-proyecto
        cordova platform add android

    - name: Compilar Archivo de Instalación (APK)
      run: |
        cd app-proyecto
        cordova build android --buildConfig=none

    - name: Guardar Aplicación Resultante
      uses: actions/upload-artifact@v3
      with:
        name: Teleprompter-Instalable-APK
        path: app-proyecto/platforms/android/app/build/outputs/apk/debug/app-debug.apk
